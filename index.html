<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>REEL-MINI</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF8F3F">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0D0D0F;
    --surface:#18181B;
    --surface-2:#222226;
    --accent:#FF8F3F;
    --accent-dim:#5C3A22;
    --ok:#3DDC97;
    --danger:#FF5C5C;
    --text:#F5F3EE;
    --muted:#8C8C92;
    --yt:#FF3B30;
    --tt:#25F4EE;
    --ig:#E1306C;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    overscroll-behavior-y:none;
  }
  body{
    min-height:100dvh;
    display:flex; flex-direction:column;
  }
  /* sprocket strip — signature motif */
  .sprockets{
    display:flex; gap:7px; padding:calc(var(--safe-top) + 8px) 16px 6px;
    overflow:hidden; background:var(--bg);
  }
  .sprockets span{
    width:5px; height:5px; border-radius:50%; background:var(--surface-2);
    flex:0 0 auto;
  }

  header{
    position:sticky; top:0; z-index:10;
    display:flex; align-items:center; justify-content:space-between;
    padding:4px 18px 14px;
    background:var(--bg);
    border-bottom:1px solid var(--surface-2);
  }
  .logo{
    font-family:"Space Grotesk", sans-serif; font-weight:700;
    font-size:22px; letter-spacing:-0.02em; color:var(--text);
    display:flex; align-items:baseline; gap:2px;
  }
  .logo .dot{color:var(--accent);}

  .add-btn{
    width:44px; height:44px; border-radius:50%;
    background:var(--accent); color:#16100A;
    border:none; font-size:24px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 0 4px rgba(255,143,63,0.12);
    transition:transform .15s ease; cursor:pointer;
  }
  .add-btn:active{transform:scale(0.9);}

  /* フォルダタブUIの追加 */
  .folder-tabs{
    display:flex; gap:8px; padding:12px 14px 0; overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .folder-tab{
    flex:0 0 auto; padding:10px 14px; border-radius:20px;
    background:var(--surface-2); border:none; color:var(--muted);
    font-size:14px; font-weight:600; font-family:inherit;
    transition:all .2s ease; white-space:nowrap; cursor:pointer;
    min-height:44px; display:flex; align-items:center;
  }
  .folder-tab.active{
    background:var(--accent); color:#16100A;
  }
  .folder-tab:active{transform:scale(0.98);}

  main{
    flex:1; overflow-y:auto;
    padding:14px 14px calc(var(--safe-bottom) + 90px);
  }

  .grid{
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
  }

  /* ー 動画カード：プラットフォーム別アスペクト比 ー */
  .card{
    position:relative; border-radius:14px; overflow:hidden;
    background:var(--surface);
    box-shadow:0 4px 14px rgba(0,0,0,0.35);
    transition:transform .12s ease; cursor:pointer;
  }
  .card.youtube{aspect-ratio:16/9;}
  .card.tiktok{aspect-ratio:9/16;}
  .card.instagram{aspect-ratio:1/1;}
  .card.other{aspect-ratio:9/14;}

  .card.pressing{transform:scale(0.96);}
  .card img{
    width:100%; height:100%; object-fit:cover; display:block;
    filter:saturate(1.05);
  }
  .card .grad{
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(0,0,0,0.78) 100%);
  }
  .card .badge{
    position:absolute; left:8px; bottom:8px;
    display:flex; align-items:center; gap:5px;
    background:rgba(0,0,0,0.45); backdrop-filter:blur(6px);
    padding:4px 8px 4px 6px; border-radius:100px;
  }
  .card .badge .dot{width:7px; height:7px; border-radius:50%;}
  .card .badge span{font-size:11px; font-weight:600; color:#fff; letter-spacing:0.02em;}
  
  /* タイトル表示：ティックトックはオーバーレイで明示 */
  .card .title{
    position:absolute; right:8px; left:8px; bottom:30px;
    font-size:12px; color:rgba(255,255,255,0.85); line-height:1.3;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    pointer-events:none;
  }
  .card.tiktok .title{
    position:absolute; inset:8px; bottom:auto;
    font-size:13px; font-weight:600; color:rgba(255,255,255,0.95);
    background:linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 100%);
    padding:10px 8px 20px; display:-webkit-box; -webkit-line-clamp:3;
    -webkit-box-orient:vertical; overflow:hidden;
  }

  /* お気に入りボタン */
  .fav-btn{
    position:absolute; top:8px; right:8px;
    width:44px; height:44px; border-radius:50%;
    background:rgba(0,0,0,0.45); border:none;
    color:#fff; font-size:20px;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(6px); cursor:pointer;
    transition:all .2s ease; z-index:5;
  }
  .fav-btn:active{transform:scale(0.9);}
  .fav-btn.favorited{
    background:var(--accent); color:#16100A;
  }

  .empty{
    text-align:center; padding:80px 30px 0; color:var(--muted);
  }
  .empty .glyph{font-size:36px; margin-bottom:14px; opacity:.6;}
  .empty h3{color:var(--text); font-size:16px; margin:0 0 8px; font-weight:600;}
  .empty p{font-size:13px; line-height:1.6; margin:0;}

  /* toast */
  .toast{
    position:fixed; left:50%; bottom:90px; transform:translateX(-50%) translateY(20px);
    background:var(--surface-2); color:var(--text);
    padding:12px 18px; border-radius:100px; font-size:13px; font-weight:600;
    display:flex; align-items:center; gap:8px;
    opacity:0; pointer-events:none; transition:all .25s ease;
    box-shadow:0 8px 24px rgba(0,0,0,0.4); z-index:50;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .toast .ok-dot{width:8px; height:8px; border-radius:50%; background:var(--ok);}

  /* loading overlay */
  .loading{
    position:fixed; inset:0; background:var(--bg); z-index:60;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .loading.show{opacity:1; pointer-events:all;}
  .spinner{
    width:30px; height:30px; border-radius:50%;
    border:3px solid var(--surface-2); border-top-color:var(--accent);
    animation:spin .7s linear infinite;
  }
  .loading p{color:var(--muted); font-size:13px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* action sheet for long-press delete */
  .sheet-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:40;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .sheet-backdrop.show{opacity:1; pointer-events:all;}
  .sheet{
    position:fixed; left:10px; right:10px; bottom:calc(var(--safe-bottom) + 10px);
    z-index:41; transform:translateY(120%); transition:transform .25s cubic-bezier(.2,.9,.3,1);
  }
  .sheet.show{transform:translateY(0);}
  .sheet-group{background:var(--surface-2); border-radius:16px; overflow:hidden; margin-bottom:8px;}
  .sheet-item{
    padding:16px; text-align:center; font-size:16px; font-weight:600;
    border-bottom:1px solid rgba(255,255,255,0.06); background:none; border-left:none; border-right:none; border-top:none;
    width:100%; color:var(--text); font-family:inherit; cursor:pointer;
    min-height:44px; display:flex; align-items:center; justify-content:center;
  }
  .sheet-item:last-child{border-bottom:none;}
  .sheet-item.danger{color:var(--danger);}
  .sheet-item.cancel{background:var(--surface-2); border-radius:16px; font-weight:700;}

  /* add modal */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:40;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
    display:flex; align-items:flex-end;
  }
  .modal-backdrop.show{opacity:1; pointer-events:all;}
  .modal{
    width:100%; background:var(--surface); border-radius:20px 20px 0 0;
    padding:22px 18px calc(var(--safe-bottom) + 22px);
    transform:translateY(100%); transition:transform .25s cubic-bezier(.2,.9,.3,1);
  }
  .modal-backdrop.show .modal{transform:translateY(0);}
  .modal-header{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:14px;
  }
  .modal h3{margin:0; font-size:17px; font-weight:700;}
  .modal-close-btn{
    width:44px; height:44px; border:none; background:var(--surface-2);
    border-radius:50%; color:var(--text); font-size:20px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .modal-close-btn:active{transform:scale(0.9);}
  .modal input{
    width:100%; padding:13px 14px; border-radius:12px; border:1px solid var(--surface-2);
    background:var(--bg); color:var(--text); font-size:14px; margin-bottom:12px;
  }
  .modal input::placeholder{color:var(--muted);}
  .url-preview{
    display:flex; align-items:center; gap:10px;
    padding:8px 10px; margin:-4px 0 12px; border-radius:10px;
    background:var(--bg); border:1px solid var(--surface-2);
    font-size:13px; color:var(--muted);
  }
  .url-preview img{
    width:34px; height:52px; object-fit:cover; border-radius:6px;
    flex:0 0 auto; background:var(--surface-2);
  }
  .url-preview .platform-dot{
    width:8px; height:8px; border-radius:50%; flex:0 0 auto;
  }
  .url-preview span{display:flex; align-items:center; gap:6px; font-weight:600;}
  .modal-actions{display:flex; gap:8px;}
  .modal-actions button{
    flex:1; padding:13px; border-radius:12px; border:none; font-size:14px; font-weight:700; font-family:inherit;
    cursor:pointer; min-height:44px;
  }
  .btn-cancel{background:var(--surface-2); color:var(--text);}
  .btn-save{background:var(--accent); color:#16100A;}

  /* 設定画面 */
  .settings-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:70;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
    display:flex; align-items:flex-end;
  }
  .settings-overlay.show{opacity:1; pointer-events:all;}
  .settings-panel{
    width:100%; background:var(--surface); border-radius:20px 20px 0 0;
    padding:22px 18px calc(var(--safe-bottom) + 22px);
    transform:translateY(100%); transition:transform .25s cubic-bezier(.2,.9,.3,1);
    max-height:80dvh; overflow-y:auto;
  }
  .settings-overlay.show .settings-panel{transform:translateY(0);}
  .settings-header{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:20px;
  }
  .settings-panel h2{margin:0; font-size:18px; font-weight:700;}
  .settings-close-btn{
    width:44px; height:44px; border:none; background:var(--surface-2);
    border-radius:50%; color:var(--text); font-size:20px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .settings-close-btn:active{transform:scale(0.9);}
  .settings-group{margin-bottom:20px; border-top:1px solid var(--surface-2); padding-top:16px;}
  .settings-group:first-of-type{border-top:none; padding-top:0;}

  .settings-group h3{
    font-size:13px; font-weight:700; color:var(--muted); margin:0 0 12px; text-transform:uppercase; letter-spacing:0.05em;
  }

  .settings-buttons{
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
  }

  .settings-btn{
    padding:12px; border-radius:12px; border:1px solid var(--surface-2);
    background:var(--surface); color:var(--text);
    font-size:13px; font-weight:600; font-family:inherit; cursor:pointer;
    min-height:44px; display:flex; align-items:center; justify-content:center;
  }

  .settings-btn.active{
    background:var(--accent); color:#16100A; border-color:var(--accent);
  }

  .settings-btn.danger{
    grid-column:1 / -1; background:rgba(255,92,92,0.1); border-color:var(--danger); color:var(--danger);
  }

  .confirm-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:80;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
    display:flex; align-items:center; justify-content:center;
  }
  .confirm-overlay.show{opacity:1; pointer-events:all;}
  .confirm-dialog{
    background:var(--surface); border-radius:20px; padding:24px;
    width:85%; max-width:320px;
    transform:scale(0.9); transition:transform .25s cubic-bezier(.2,.9,.3,1);
  }
  .confirm-overlay.show .confirm-dialog{transform:scale(1);}
  .confirm-dialog h3{margin:0 0 10px; font-size:17px; font-weight:700;}
  .confirm-dialog p{margin:0 0 20px; font-size:14px; color:var(--muted); line-height:1.5;}
  .confirm-actions{display:flex; gap:10px;}
  .confirm-actions button{
    flex:1; padding:12px; border-radius:12px; border:none;
    font-size:14px; font-weight:700; font-family:inherit; cursor:pointer;
    min-height:44px;
  }
  .confirm-cancel{background:var(--surface-2); color:var(--text);}
  .confirm-delete{background:var(--danger); color:#fff;}

  /* light theme */
  body.light-theme{
    --bg:#F5F3EE;
    --surface:#FFFFFF;
    --surface-2:#E8E8ED;
    --text:#0D0D0F;
    --muted:#8C8C92;
    --accent-dim:rgba(255,143,63,0.1);
  }
</style>
</head>
<body>
<div class="sprockets">
  <span></span><span></span><span></span><span></span>
</div>

<header>
  <div class="logo">REEL<span class="dot">.</span>MINI</div>
  <button class="add-btn" id="addBtn" title="動画を追加">+</button>
</header>

<!-- フォルダタブUI -->
<div class="folder-tabs" id="folderTabs">
  <button class="folder-tab active" data-folder="youtube" title="YouTube">YouTube</button>
  <button class="folder-tab" data-folder="tiktok" title="ティックトック">ティックトック</button>
  <button class="folder-tab" data-folder="instagram" title="インスタグラム">インスタグラム</button>
  <button class="folder-tab" data-folder="other" title="その他">その他</button>
</div>

<main id="main"></main>

<!-- 動画追加モーダル -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-header">
      <h3>動画を追加</h3>
      <button class="modal-close-btn" id="modalCloseBtn" title="閉じる">▽</button>
    </div>
    <input type="text" id="urlInput" placeholder="YouTube, TikTok, InstagramのURLを入力" autocomplete="off">
    <input type="text" id="titleInput" placeholder="タイトル（省略可）" autocomplete="off">
    <div class="url-preview" id="urlPreview" style="display:none;">
      <img id="previewThumb" src="" alt="">
      <span><div class="platform-dot" id="platformDot"></div><span id="platformName"></span></span>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modalCancelBtn">キャンセル</button>
      <button class="btn-save" id="modalSaveBtn">保存</button>
    </div>
  </div>
</div>

<!-- 長押し削除用アクションシート -->
<div class="sheet-backdrop" id="sheetBackdrop">
  <div class="sheet" id="sheet">
    <div class="sheet-group">
      <button class="sheet-item danger" id="deleteBtn">削除</button>
    </div>
    <div class="sheet-group">
      <button class="sheet-item cancel" id="cancelBtn">キャンセル</button>
    </div>
  </div>
</div>

<!-- 設定画面 -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <div class="settings-header">
      <h2>設定</h2>
      <button class="settings-close-btn" id="settingsCloseBtn" title="閉じる">▽</button>
    </div>

    <!-- バックアップ・復元 -->
    <div class="settings-group">
      <h3>データ管理</h3>
      <div class="settings-buttons">
        <button class="settings-btn" id="backupBtn">📥 バックアップ</button>
        <button class="settings-btn" id="restoreBtn">📤 復元</button>
      </div>
      <input type="file" id="restoreFile" accept=".json" style="display:none;">
    </div>

    <!-- テーマ切り替え -->
    <div class="settings-group">
      <h3>テーマ</h3>
      <div class="settings-buttons">
        <button class="settings-btn active" id="darkThemeBtn">🌙 ダーク</button>
        <button class="settings-btn" id="lightThemeBtn">☀️ ライト</button>
      </div>
    </div>

    <!-- 危険ゾーン -->
    <div class="settings-group">
      <h3>危険ゾーン</h3>
      <button class="settings-btn danger" id="deleteAllBtn">すべてのデータを削除</button>
    </div>

    <div class="settings-group" style="text-align:center; color:var(--muted); font-size:12px;">
      <p>v2.1 | REEL-MINI © 2024</p>
    </div>
  </div>
</div>

<!-- 確認ダイアログ -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-dialog">
    <h3 id="confirmTitle">確認</h3>
    <p id="confirmMessage">本当に削除しますか？</p>
    <div class="confirm-actions">
      <button class="confirm-cancel" id="confirmCancel">キャンセル</button>
      <button class="confirm-delete" id="confirmDelete">削除</button>
    </div>
  </div>
</div>

<!-- トースト通知 -->
<div class="toast" id="toast">
  <div class="ok-dot"></div>
  <span id="toastText">保存しました</span>
</div>

<!-- ローディングオーバーレイ -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>処理中...</p>
</div>

<!-- 設定ボタン（右下） -->
<button class="add-btn" id="settingsBtn" style="position:fixed; bottom:20px; right:20px; z-index:15; background:var(--surface-2);" title="設定">⚙️</button>

<script>
  'use strict';

  // ========================================
  // グローバル状態管理
  // ========================================

  let items = [];
  let currentFolder = 'youtube';
  let selectedCardId = null;
  let pressTimer = null;

  // ========================================
  // ローカルストレージ操作
  // ========================================

  function saveToStorage(){
    localStorage.setItem('reelMiniItems', JSON.stringify(items));
  }

  function loadFromStorage(){
    const stored = localStorage.getItem('reelMiniItems');
    if(stored){
      try {
        items = JSON.parse(stored);
      } catch(e) {
        console.error('データ読み込みエラー:', e);
        items = [];
      }
    }
  }

  function saveTheme(theme){
    localStorage.setItem('reelMiniTheme', theme);
  }

  function loadTheme(){
    const theme = localStorage.getItem('reelMiniTheme') || 'dark';
    applyTheme(theme);
  }

  function applyTheme(theme){
    if(theme === 'light'){
      document.body.classList.add('light-theme');
      document.getElementById('darkThemeBtn').classList.remove('active');
      document.getElementById('lightThemeBtn').classList.add('active');
    } else {
      document.body.classList.remove('light-theme');
      document.getElementById('darkThemeBtn').classList.add('active');
      document.getElementById('lightThemeBtn').classList.remove('active');
    }
    saveTheme(theme);
  }

  // ========================================
  // トースト通知
  // ========================================

  function showToast(message){
    const toast = document.getElementById('toast');
    document.getElementById('toastText').textContent = message;
    toast.classList.add('show');
    setTimeout(() => {
      toast.classList.remove('show');
    }, 2000);
  }

  // ========================================
  // プラットフォーム判定
  // ========================================

  function detectPlatform(url){
    url = url.toLowerCase();
    if(url.includes('youtube.com') || url.includes('youtu.be')) return 'youtube';
    if(url.includes('tiktok.com') || url.includes('vm.tiktok.com')) return 'tiktok';
    if(url.includes('instagram.com') || url.includes('instagr.am')) return 'instagram';
    return 'other';
  }

  function getPlatformColor(platform){
    const colors = {youtube: '#FF3B30', tiktok: '#25F4EE', instagram: '#E1306C', other: '#8C8C92'};
    return colors[platform] || colors.other;
  }

  function getPlatformLabel(platform){
    const labels = {youtube: 'YouTube', tiktok: 'TikTok', instagram: 'Instagram', other: 'その他'};
    return labels[platform] || labels.other;
  }

  // ========================================
  // YouTubeビデオID抽出（修正1: 自前化）
  // ========================================

  function extractYouTubeVideoId(url){
    try {
      const urlObj = new URL(url);
      
      // youtube.com形式: ?v=VIDEO_ID
      if(urlObj.hostname.includes('youtube.com')){
        return urlObj.searchParams.get('v');
      }
      
      // youtu.be形式: /VIDEO_ID
      if(urlObj.hostname.includes('youtu.be')){
        return urlObj.pathname.slice(1).split('?')[0];
      }
    } catch(e) {
      console.error('URL解析エラー:', e);
    }
    return null;
  }

  // ========================================
  // サムネイル生成（修正2: YouTube直接取得＆外部API廃止）
  // ========================================

  async function generateThumbnail(url, platform){
    return new Promise((resolve) => {
      // YouTube: 公式CDNから直接取得（外部API依存廃止）
      if(platform === 'youtube'){
        const videoId = extractYouTubeVideoId(url);
        if(videoId){
          // hqdefault.jpg: 480×360（最高品質）
          resolve(`https://img.youtube.com/vi/${videoId}/hqdefault.jpg`);
          return;
        }
      }

      // TikTok / Instagram / その他: og-reader APIを使用（フォールバック）
      const oGraphUrl = `https://api.og-reader.com/api/read?url=${encodeURIComponent(url)}`;
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 5000);

      fetch(oGraphUrl, {signal: controller.signal})
        .then(r => r.json())
        .then(data => {
          clearTimeout(timeout);
          if(data.image && data.image.url){
            resolve(data.image.url);
          } else {
            resolve(createDefaultThumbnail(platform));
          }
        })
        .catch(() => {
          clearTimeout(timeout);
          resolve(createDefaultThumbnail(platform));
        });
    });
  }

  function createDefaultThumbnail(platform){
    const canvas = document.createElement('canvas');
    canvas.width = 320;
    canvas.height = 180;
    const ctx = canvas.getContext('2d');

    const colors = {youtube: '#FF3B30', tiktok: '#25F4EE', instagram: '#E1306C', other: '#8C8C92'};
    const color = colors[platform] || colors.other;

    ctx.fillStyle = color;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(getPlatformLabel(platform), canvas.width / 2, canvas.height / 2);

    return canvas.toDataURL();
  }

  // ========================================
  // カード生成（修正3: イベント統合＋動画遷移実装）
  // ========================================

  function safeCreateCard(item){
    const card = document.createElement('div');
    card.className = `card ${item.platform}`;
    card.dataset.id = item.id;

    // 画像
    const img = document.createElement('img');
    img.src = item.thumb || createDefaultThumbnail(item.platform);
    img.alt = item.title || 'thumbnail';
    card.appendChild(img);

    // グラデーション
    const grad = document.createElement('div');
    grad.className = 'grad';
    card.appendChild(grad);

    // お気に入りボタン
    const favBtn = document.createElement('button');
    favBtn.className = `fav-btn ${item.favorite ? 'favorited' : ''}`;
    favBtn.innerHTML = item.favorite ? '★' : '☆';
    favBtn.title = item.favorite ? 'お気に入り解除' : 'お気に入り';
    favBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFavorite(item.id);
    });
    card.appendChild(favBtn);

    // バッジ
    const badge = document.createElement('div');
    badge.className = 'badge';
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.style.backgroundColor = getPlatformColor(item.platform);
    const span = document.createElement('span');
    span.textContent = getPlatformLabel(item.platform);
    badge.appendChild(dot);
    badge.appendChild(span);
    card.appendChild(badge);

    // タイトル
    const title = document.createElement('div');
    title.className = 'title';
    title.textContent = item.title || '(タイトルなし)';
    card.appendChild(title);

    // ========================================
    // イベント統合: pointerdown, pointerup, pointercancel を1つのリスナーセットに
    // ========================================

    card.addEventListener('pointerdown', (e) => {
      // 長押し判定タイマー開始
      pressTimer = setTimeout(() => {
        openSheet(item.id);
        pressTimer = null;
      }, 500);

      // 圧縮フィードバック開始
      card.classList.add('pressing');
    });

    card.addEventListener('pointerup', (e) => {
      // タイマーが残っている = 短タップ → 動画を開く（修正4: 動画遷移実装）
      if(pressTimer){
        clearTimeout(pressTimer);
        pressTimer = null;
        window.open(item.url, '_blank');
      }

      // 圧縮フィードバック解除
      card.classList.remove('pressing');
    });

    card.addEventListener('pointercancel', () => {
      if(pressTimer){
        clearTimeout(pressTimer);
        pressTimer = null;
      }
      card.classList.remove('pressing');
    });

    return card;
  }

  // ========================================
  // お気に入り機能
  // ========================================

  function toggleFavorite(id){
    const item = items.find(i => i.id === id);
    if(item){
      item.favorite = !item.favorite;
      saveToStorage();
      render();
      showToast(item.favorite ? 'お気に入りに追加しました' : 'お気に入りから削除しました');
    }
  }

  // ========================================
  // レンダリング
  // ========================================

  function render(){
    const main = document.getElementById('main');
    main.innerHTML = '';

    const folderItems = items.filter(i => i.platform === currentFolder);

    folderItems.sort((a, b) => {
      if(a.favorite !== b.favorite){
        return b.favorite - a.favorite;
      }
      return b.timestamp - a.timestamp;
    });

    if(folderItems.length === 0){
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.innerHTML = `
        <div class="glyph">📭</div>
        <h3>まだ動画がありません</h3>
        <p>${getPlatformLabel(currentFolder)}のURLを<br>追加してみてください</p>
      `;
      main.appendChild(empty);
    } else {
      const grid = document.createElement('div');
      grid.className = 'grid';
      folderItems.forEach(item => {
        grid.appendChild(safeCreateCard(item));
      });
      main.appendChild(grid);
    }
  }

  // ========================================
  // フォルダタブ切り替え
  // ========================================

  document.querySelectorAll('.folder-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.folder-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentFolder = tab.dataset.folder;
      render();
    });
  });

  // ========================================
  // モーダル処理（修正5: 履歴同期）
  // ========================================

  const modalBackdrop = document.getElementById('modalBackdrop');
  const urlInput = document.getElementById('urlInput');
  const titleInput = document.getElementById('titleInput');
  const urlPreview = document.getElementById('urlPreview');
  const previewThumb = document.getElementById('previewThumb');
  const platformDot = document.getElementById('platformDot');
  const platformName = document.getElementById('platformName');

  document.getElementById('addBtn').addEventListener('click', () => {
    urlInput.value = '';
    titleInput.value = '';
    urlPreview.style.display = 'none';
    modalBackdrop.classList.add('show');
    urlInput.focus();
    
    // 履歴に追加（戻るボタンで閉じるように）
    history.pushState({modal: 'add'}, '');
  });

  document.getElementById('modalCloseBtn').addEventListener('click', () => {
    modalBackdrop.classList.remove('show');
  });

  document.getElementById('modalCancelBtn').addEventListener('click', () => {
    modalBackdrop.classList.remove('show');
  });

  document.getElementById('modalSaveBtn').addEventListener('click', async () => {
    const url = urlInput.value.trim();
    const title = titleInput.value.trim();

    if(!url){
      showToast('URLを入力してください');
      return;
    }

    try {
      new URL(url);
    } catch(e) {
      showToast('有効なURLを入力してください');
      return;
    }

    const platform = detectPlatform(url);
    const thumb = previewThumb.src || createDefaultThumbnail(platform);

    const newItem = {
      id: `${Date.now()}-${Math.random().toString(36).substr(2, 9)}`,
      url: url,
      platform: platform,
      title: title || `動画 - ${getPlatformLabel(platform)}`,
      thumb: thumb,
      timestamp: Date.now(),
      favorite: false,
    };

    items.push(newItem);
    saveToStorage();
    modalBackdrop.classList.remove('show');
    
    currentFolder = platform;
    document.querySelectorAll('.folder-tab').forEach(t => {
      t.classList.remove('active');
      if(t.dataset.folder === platform) t.classList.add('active');
    });

    render();
    showToast('動画を保存しました');
  });

  modalBackdrop.addEventListener('click', (e) => {
    if(e.target === modalBackdrop) modalBackdrop.classList.remove('show');
  });

  urlInput.addEventListener('input', async () => {
    const url = urlInput.value.trim();
    if(!url){
      urlPreview.style.display = 'none';
      return;
    }

    const platform = detectPlatform(url);
    urlPreview.style.display = 'flex';
    platformName.textContent = getPlatformLabel(platform);
    platformDot.style.backgroundColor = getPlatformColor(platform);

    const thumb = await generateThumbnail(url, platform);
    previewThumb.src = thumb;
  });

  // ========================================
  // 削除機能
  // ========================================

  const sheetBackdrop = document.getElementById('sheetBackdrop');

  function openSheet(id){
    selectedCardId = id;
    sheetBackdrop.classList.add('show');
    history.pushState({sheet: 'delete'}, '');
  }

  function closeSheet(){
    sheetBackdrop.classList.remove('show');
    selectedCardId = null;
  }

  document.getElementById('deleteBtn').addEventListener('click', () => {
    if(selectedCardId){
      items = items.filter(i => i.id !== selectedCardId);
      saveToStorage();
      render();
      closeSheet();
      showToast('動画を削除しました');
    }
  });

  document.getElementById('cancelBtn').addEventListener('click', closeSheet);

  sheetBackdrop.addEventListener('click', (e) => {
    if(e.target === sheetBackdrop) closeSheet();
  });

  // ========================================
  // 設定画面（修正6: 履歴同期）
  // ========================================

  const settingsOverlay = document.getElementById('settingsOverlay');
  const confirmOverlay = document.getElementById('confirmOverlay');
  const confirmTitle = document.getElementById('confirmTitle');
  const confirmMessage = document.getElementById('confirmMessage');

  document.getElementById('settingsBtn').addEventListener('click', () => {
    settingsOverlay.classList.add('show');
    history.pushState({settings: 'open'}, '');
  });

  document.getElementById('settingsCloseBtn').addEventListener('click', () => {
    settingsOverlay.classList.remove('show');
  });

  settingsOverlay.addEventListener('click', (e) => {
    if(e.target === settingsOverlay) settingsOverlay.classList.remove('show');
  });

  // ========================================
  // バックアップ機能
  // ========================================

  document.getElementById('backupBtn').addEventListener('click', () => {
    try {
      const backup = {
        version: '2.1',
        exportedAt: new Date().toISOString(),
        items: items,
      };

      const json = JSON.stringify(backup, null, 2);
      const blob = new Blob([json], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `reel-mini-backup-${new Date().getTime()}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      showToast('バックアップをダウンロードしました');
    } catch(e) {
      console.error('バックアップエラー:', e);
      showToast('バックアップに失敗しました');
    }
  });

  // ========================================
  // 復元機能
  // ========================================

  const restoreFile = document.getElementById('restoreFile');

  document.getElementById('restoreBtn').addEventListener('click', () => {
    restoreFile.click();
  });

  restoreFile.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const backup = JSON.parse(ev.target.result);
        if(!backup.items || !Array.isArray(backup.items)){
          showToast('無効なバックアップファイルです');
          return;
        }

        const REQUIRED_KEYS = ['id', 'url', 'platform', 'title', 'thumb'];
        const isValidItem = (item) => {
          if(!item || typeof item !== 'object') return false;
          return REQUIRED_KEYS.every(key => Object.prototype.hasOwnProperty.call(item, key) && item[key] !== null && item[key] !== undefined);
        };

        const allValid = backup.items.every(isValidItem);
        if(!allValid){
          showToast('バックアップデータが破損しています');
          return;
        }

        items = backup.items;
        saveToStorage();
        render();
        settingsOverlay.classList.remove('show');
        showToast('データを復元しました');
      } catch(e) {
        console.error('復元エラー:', e);
        showToast('復元に失敗しました');
      }
    };
    reader.readAsText(file);
    restoreFile.value = '';
  });

  // ========================================
  // テーマ切り替え
  // ========================================

  document.getElementById('darkThemeBtn').addEventListener('click', () => {
    applyTheme('dark');
  });

  document.getElementById('lightThemeBtn').addEventListener('click', () => {
    applyTheme('light');
  });

  // ========================================
  // データ全消去
  // ========================================

  document.getElementById('deleteAllBtn').addEventListener('click', () => {
    confirmTitle.textContent = 'すべてのデータを削除';
    confirmMessage.textContent = 'この操作は取り消せません。本当に削除しますか？';
    confirmOverlay.classList.add('show');
    confirmOverlay.dataset.action = 'deleteAll';
  });

  document.getElementById('confirmCancel').addEventListener('click', () => {
    confirmOverlay.classList.remove('show');
    confirmOverlay.dataset.action = '';
  });

  confirmOverlay.addEventListener('click', (e) => {
    if(e.target === confirmOverlay) {
      confirmOverlay.classList.remove('show');
      confirmOverlay.dataset.action = '';
    }
  });

  document.getElementById('confirmDelete').addEventListener('click', () => {
    if(confirmOverlay.dataset.action === 'deleteAll'){
      items = [];
      saveToStorage();
      render();
      confirmOverlay.classList.remove('show');
      settingsOverlay.classList.remove('show');
      showToast('すべてのデータを削除しました');
    }
  });

  // ========================================
  // 戻るボタン対応（修正7: 履歴状態に基づいたクローズ）
  // ========================================

  window.addEventListener('popstate', (e) => {
    const state = e.state || {};

    if(settingsOverlay.classList.contains('show')){
      settingsOverlay.classList.remove('show');
      return;
    }
    if(modalBackdrop.classList.contains('show')){
      modalBackdrop.classList.remove('show');
      return;
    }
    if(sheetBackdrop.classList.contains('show')){
      closeSheet();
      return;
    }
  });

  if(history.length === 1){
    window.history.pushState({page: 'main'}, null);
  }

  // ========================================
  // Web Share Target 自動受け取り
  // ========================================

  function extractSharedURL(){
    const params = new URLSearchParams(window.location.search);
    let url = (params.get('url') || '').trim();
    const title = (params.get('title') || '').trim();
    const text = (params.get('text') || '').trim();

    if(!url && text){
      const match = text.match(/https?:\/\/[^\s]+/);
      if(match) url = match[0];
    }

    return { url, title };
  }

  function runSaveFlow(url, title){
    const platform = detectPlatform(url);
    const loading = document.getElementById('loading');
    loading.classList.add('show');

    generateThumbnail(url, platform).then(thumb => {
      const newItem = {
        id: `${Date.now()}-${Math.random().toString(36).substr(2, 9)}`,
        url: url,
        platform: platform,
        title: title || `動画 - ${getPlatformLabel(platform)}`,
        thumb: thumb,
        timestamp: Date.now(),
        favorite: false,
      };

      items.push(newItem);
      saveToStorage();
      
      currentFolder = platform;
      document.querySelectorAll('.folder-tab').forEach(t => {
        t.classList.remove('active');
        if(t.dataset.folder === platform) t.classList.add('active');
      });

      render();
      loading.classList.remove('show');
      showToast('動画を保存しました');
    });
  }

  function handleShareTarget(){
    const hadParams = !!window.location.search;
    const { url, title } = extractSharedURL();

    if(url){
      runSaveFlow(url, title);
    }

    if(hadParams){
      history.replaceState({}, document.title, window.location.pathname);
    }
  }

  // ========================================
  // 初期化
  // ========================================

  loadTheme();
  loadFromStorage();
  render();
  handleShareTarget();

  // ========================================
  // Service Worker 登録
  // ========================================

  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then((reg) => {
          console.log('Service Worker registered:', reg.scope);
        })
        .catch((err) => {
          console.error('Service Worker registration failed:', err);
        });
    });
  }
</script>
</body>
</html>
