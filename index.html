<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>REEL-MINI</title>
<meta name="theme-color" content="#FF8F3F">
<style>
:root{--bg:#0D0D0F;--surface:#18181B;--surface-2:#222226;--accent:#FF8F3F;--danger:#FF5C5C;--text:#F5F3EE;--muted:#8C8C92;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;overscroll-behavior-y:none;}
body{min-height:100dvh;display:flex;flex-direction:column;}
.sprockets{display:flex;gap:7px;padding:calc(var(--safe-top)+8px) 16px 6px;background:var(--bg);}
.sprockets span{width:5px;height:5px;border-radius:50%;background:var(--surface-2);}
header{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:4px 18px 14px;background:var(--bg);border-bottom:1px solid var(--surface-2);}
.logo{font-weight:700;font-size:22px;color:var(--text);}
.logo .dot{color:var(--accent);}
.add-btn{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#16100A;border:none;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.folder-tabs{display:flex;gap:8px;padding:12px 14px 0;overflow-x:auto;}
.folder-tab{flex:0 0 auto;padding:10px 14px;border-radius:20px;background:var(--surface-2);border:none;color:var(--muted);font-size:14px;cursor:pointer;min-height:44px;}
.folder-tab.active{background:var(--accent);color:#16100A;}
main{flex:1;overflow-y:auto;padding:14px 14px calc(var(--safe-bottom)+90px);}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.card{position:relative;border-radius:14px;overflow:hidden;background:var(--surface);cursor:pointer;touch-action:pan-y;}
.card.youtube{aspect-ratio:16/9;}
.card.tiktok{aspect-ratio:9/16;}
.card.instagram{aspect-ratio:1/1;}
.card.other{aspect-ratio:9/14;}
.card img{width:100%;height:100%;object-fit:cover;}
.card .grad{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 0%,rgba(0,0,0,0.9) 100%);}
.card.tiktok .grad{background:linear-gradient(180deg,rgba(0,0,0,0.6) 0%,rgba(0,0,0,0) 100%);}
.card .title{position:absolute;bottom:40px;left:8px;right:50px;font-size:12px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.5);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card.tiktok .title{bottom:auto;top:12px;-webkit-line-clamp:3;font-size:14px;font-weight:700;}
.card .fav-btn{position:absolute;top:8px;right:8px;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.5);border:none;color:#fff;cursor:pointer;z-index:5;}
.card .badge{position:absolute;left:8px;bottom:8px;background:rgba(0,0,0,0.5);padding:4px 8px;border-radius:100px;font-size:11px;color:#fff;z-index:3;}
.card.pressing{transform:scale(0.97);transition:transform .15s;}
.empty{text-align:center;padding:80px 30px 0;}
.toast{position:fixed;left:14px;right:14px;bottom:calc(var(--safe-bottom)+90px);background:var(--surface-2);padding:12px 16px;border-radius:12px;opacity:0;z-index:50;transition:opacity .25s;display:flex;align-items:center;gap:8px;}
.toast.show{opacity:1;}
.toast-undo{margin-left:auto;padding:6px 12px;background:var(--accent);color:#16100A;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;min-height:32px;white-space:nowrap;}
.modal{position:fixed;left:0;right:0;bottom:0;top:0;background:rgba(0,0,0,0.5);z-index:40;display:none;align-items:flex-end;}
.modal.show{display:flex;}
.modal-content{background:var(--surface);width:100%;border-radius:20px 20px 0 0;padding:20px;max-height:80vh;overflow-y:auto;position:relative;}
.modal-close{position:absolute;top:12px;right:12px;width:40px;height:40px;border:none;background:var(--surface-2);border-radius:50%;color:var(--text);cursor:pointer;z-index:50;}
.modal h3{margin:0 0 16px;font-size:18px;font-weight:700;}
.modal input{width:100%;padding:12px;border:1px solid var(--surface-2);border-radius:12px;background:var(--bg);color:var(--text);margin-bottom:12px;font-family:inherit;}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.modal-actions button{flex:1;padding:12px;border:none;border-radius:12px;font-weight:700;cursor:pointer;min-height:44px;}
.btn-cancel{background:var(--surface-2);color:var(--text);}
.btn-save{background:var(--accent);color:#16100A;}
.settings-overlay{position:fixed;inset:0;bottom:0;top:0;background:rgba(0,0,0,0.5);z-index:70;display:none;align-items:flex-end;}
.settings-overlay.show{display:flex;}
.settings-panel{background:var(--surface);width:100%;border-radius:20px 20px 0 0;padding:22px 18px calc(var(--safe-bottom)+22px);max-height:80dvh;overflow-y:auto;position:relative;}
.settings-group{margin-bottom:20px;border-top:1px solid var(--surface-2);padding-top:16px;}
.settings-group:first-of-type{border-top:none;padding-top:0;}
.settings-buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.settings-btn{padding:12px;border:1px solid var(--surface-2);background:var(--surface);color:var(--text);border-radius:12px;cursor:pointer;min-height:44px;font-family:inherit;}
.settings-btn.active{background:var(--accent);color:#16100A;}
.settings-btn.danger{grid-column:1/-1;background:rgba(255,92,92,0.1);border-color:var(--danger);color:var(--danger);}
body.light-theme{--bg:#F5F3EE;--surface:#FFFFFF;--surface-2:#E8E8ED;--text:#0D0D0F;}
</style>
</head>
<body>
<div class="sprockets"><span></span><span></span><span></span><span></span></div>
<header>
<div class="logo">REEL<span class="dot">.</span>MINI</div>
<button class="add-btn" id="addBtn">+</button>
</header>
<div class="folder-tabs" id="folderTabs">
<button class="folder-tab active" data-folder="youtube">YouTube</button>
<button class="folder-tab" data-folder="tiktok">TikTok</button>
<button class="folder-tab" data-folder="instagram">Instagram</button>
<button class="folder-tab" data-folder="other">その他</button>
</div>
<main id="main"></main>
<div class="modal" id="addModal"><div class="modal-content"><button class="modal-close" id="addClose">▽</button><h3>動画を追加</h3><input type="text" id="urlInput" placeholder="URL"><input type="text" id="titleInput" placeholder="タイトル"><div class="modal-actions"><button class="btn-cancel" id="addCancel">キャンセル</button><button class="btn-save" id="addSave">保存</button></div></div></div>
<div class="modal" id="deleteModal"><div class="modal-content"><button class="modal-close" id="deleteClose">▽</button><h3>削除</h3><div class="modal-actions"><button class="btn-cancel" id="deleteCancel">キャンセル</button><button class="btn-save" style="background:var(--danger);" id="deleteConfirm">削除</button></div></div></div>
<div class="settings-overlay" id="settingsOverlay"><div class="settings-panel"><button class="modal-close" id="settingsClose">▽</button><h2 style="margin:0 0 20px;font-size:18px;">設定</h2><div class="settings-group"><h3 style="font-size:13px;font-weight:700;margin:0 0 12px;text-transform:uppercase;">データ</h3><div class="settings-buttons"><button class="settings-btn" id="exportBtn">📥 エクスポート</button><button class="settings-btn" id="importBtn">📤 インポート</button></div><input type="file" id="restoreFile" accept=".json" style="display:none;"></div><div class="settings-group"><h3 style="font-size:13px;font-weight:700;margin:0 0 12px;text-transform:uppercase;">テーマ</h3><div class="settings-buttons"><button class="settings-btn active" id="darkThemeBtn">🌙 ダーク</button><button class="settings-btn" id="lightThemeBtn">☀️ ライト</button></div></div><div class="settings-group"><h3 style="font-size:13px;font-weight:700;margin:0 0 12px;text-transform:uppercase;">危険ゾーン</h3><button class="settings-btn danger" id="deleteAllBtn">すべて削除</button></div><div style="text-align:center;color:var(--muted);font-size:12px;margin-top:20px;"><p>v3.0 | REEL-MINI 2024</p></div></div></div>
<div class="toast" id="toast"><span id="toastMsg"></span></div>
<button class="add-btn" id="settingsBtn" style="position:fixed;bottom:20px;right:20px;background:var(--surface-2);">⚙️</button>
<script>
let items=[],currentFolder='youtube',selectedId=null,currentDeletedId=null,deletedStateMap={},undoTimeoutId=null;

const db={
  save:()=>{try{localStorage.setItem('reelMiniItems',JSON.stringify(items))}catch(e){console.error(e)}},
  load:()=>{try{const d=localStorage.getItem('reelMiniItems');items=d?JSON.parse(d):[]}catch(e){items=[]}},
  theme:()=>{const t=localStorage.getItem('reelMiniTheme')||'dark';applyTheme(t)}
};

const ui={
  toast:(msg,hasUndo=false)=>{
    const t=document.getElementById('toast'),m=document.getElementById('toastMsg');
    if(undoTimeoutId)clearTimeout(undoTimeoutId);
    m.textContent=msg;
    const b=t.querySelector('.toast-undo');
    if(b)b.remove();
    if(hasUndo){
      const ub=document.createElement('button');
      ub.className='toast-undo';
      ub.textContent='元に戻す';
      ub.onclick=doUndo;
      t.appendChild(ub);
    }
    t.classList.add('show');
    undoTimeoutId=setTimeout(()=>{
      t.classList.remove('show');
      if(!hasUndo&&currentDeletedId)delete deletedStateMap[currentDeletedId];
      undoTimeoutId=null;
      currentDeletedId=null;
    },3000);
  },
  closeModal:(id)=>{
    document.getElementById(id).classList.remove('show');
    history.back();
    if(id==='deleteModal') selectedId=null;
  },
  showModal:(id)=>{
    document.getElementById(id).classList.add('show');
    history.pushState({modal:id},'');
  }
};

function applyTheme(t){
  if(t==='light'){
    document.body.classList.add('light-theme');
    document.getElementById('darkThemeBtn').classList.remove('active');
    document.getElementById('lightThemeBtn').classList.add('active');
  }else{
    document.body.classList.remove('light-theme');
    document.getElementById('darkThemeBtn').classList.add('active');
    document.getElementById('lightThemeBtn').classList.remove('active');
  }
  localStorage.setItem('reelMiniTheme',t);
}

function detectPlatform(url){
  url=url.toLowerCase();
  if(url.includes('youtube')||url.includes('youtu.be'))return'youtube';
  if(url.includes('tiktok'))return'tiktok';
  if(url.includes('instagram'))return'instagram';
  return'other';
}

function extractYouTubeId(rawUrl){
  let m=rawUrl.match(/[?&]v=([^&\s?#]+)/);
  if(m)return m[1];
  m=rawUrl.match(/youtu\.be\/([^/?#\s]+)/i);
  if(m)return m[1];
  m=rawUrl.match(/\/shorts\/([^/?#\s]+)/i);
  if(m)return m[1];
  return null;
}

// 修正1: YouTube以外も小文字化して比較（大文字小文字揺れによる二重登録を防止）
function isDuplicate(url,platform){
  if(platform==='youtube'){
    const newId=extractYouTubeId(url);
    if(newId){
      return items.some(i=>{
        if(i.platform!=='youtube')return false;
        return extractYouTubeId(i.url)===newId;
      });
    }
  }
  return items.some(i=>i.url.toLowerCase()===url.toLowerCase());
}

function cleanupStaleDeletedEntries(){
  const now=Date.now();
  Object.keys(deletedStateMap).forEach(key=>{
    const entry=deletedStateMap[key];
    if(entry&&entry.deletedAt&&(now-entry.deletedAt>3000)){
      delete deletedStateMap[key];
    }
  });
}

function saveVideo(){
  const url=document.getElementById('urlInput').value.trim(),
        title=document.getElementById('titleInput').value.trim();
  if(!url){ui.toast('URLを入力してください');return}
  try{new URL(url)}catch(e){ui.toast('有効なURLを入力してください');return}

  const platform=detectPlatform(url);
  if(isDuplicate(url,platform)){ui.toast('この動画は既に保存されています');return}

  let thumb=null;
  if(platform==='youtube'){
    const vid=extractYouTubeId(url);
    if(vid)thumb=`https://img.youtube.com/vi/${vid}/hqdefault.jpg`;
  }

  items.push({
    id:`${Date.now()}-${Math.random().toString(36).substr(2,9)}`,
    url,platform,
    title:title||`動画-${platform}`,
    thumb,favorite:false,timestamp:Date.now()
  });
  db.save();
  currentFolder=platform;
  document.querySelectorAll('.folder-tab').forEach(t=>{
    t.classList.remove('active');
    if(t.dataset.folder===platform)t.classList.add('active');
  });
  render();
  ui.closeModal('addModal');
  ui.toast('保存しました');
}

function renderCard(item){
  const c=document.createElement('div');
  c.className=`card ${item.platform}`;
  let pressTimer=null;
  let startX=0,startY=0;
  let isLongPress=false;
  const MOVE_THRESHOLD=10;

  if(item.thumb){
    const img=document.createElement('img');
    img.src=item.thumb;
    img.onerror=()=>img.style.display='none';
    c.appendChild(img);
  }

  const bg=document.createElement('div');
  bg.style.cssText=`position:absolute;inset:0;background-color:${item.platform==='youtube'?'#FF3B30':item.platform==='tiktok'?'#25F4EE':item.platform==='instagram'?'#E1306C':'#8C8C92'};display:${item.thumb?'none':'flex'};align-items:center;justify-content:center;font-size:36px;color:rgba(255,255,255,0.2);`;
  bg.textContent=item.platform[0].toUpperCase();
  c.appendChild(bg);

  const grad=document.createElement('div');
  grad.className='grad';
  c.appendChild(grad);

  const t=document.createElement('div');
  t.className='title';
  t.textContent=item.title;
  c.appendChild(t);

  const fav=document.createElement('button');
  fav.className='fav-btn';
  fav.innerHTML=item.favorite?'★':'☆';
  fav.onpointerdown=(e)=>{e.stopPropagation()};
  fav.onpointerup=(e)=>{e.stopPropagation()};
  fav.onclick=(e)=>{
    e.stopPropagation();
    item.favorite=!item.favorite;
    db.save();
    render();
    ui.toast(item.favorite?'追加':'削除');
  };
  c.appendChild(fav);

  const bd=document.createElement('div');
  bd.className='badge';
  bd.textContent={youtube:'YT',tiktok:'TK',instagram:'IG',other:'...'}[item.platform];
  c.appendChild(bd);

  const clearPress=()=>{
    c.classList.remove('pressing');
    if(pressTimer){clearTimeout(pressTimer);pressTimer=null;}
  };

  // 修正3: window.openはclickハンドラのみで呼ぶ。pointerup側は長押し不成立時のタイマー解除だけを担当する
  c.onpointerdown=(e)=>{
    isLongPress=false;
    startX=e.clientX;
    startY=e.clientY;
    c.classList.add('pressing');
    pressTimer=setTimeout(()=>{
      pressTimer=null;
      c.classList.remove('pressing');
      isLongPress=true;
      selectedId=item.id;
      ui.showModal('deleteModal');
    },500);
  };

  c.onpointermove=(e)=>{
    if(!pressTimer)return;
    if(Math.abs(e.clientX-startX)>MOVE_THRESHOLD||Math.abs(e.clientY-startY)>MOVE_THRESHOLD){
      clearPress();
    }
  };

  c.onpointerup=clearPress;
  c.onpointercancel=clearPress;
  c.onpointerleave=clearPress;

  // click は pointerup の直後にブラウザが自動発火する「信頼済みイベント」。
  // ここでのみ window.open を呼ぶことで、iOS Safari等のポップアップブロックを回避する。
  // isLongPress フラグを見て、長押し成立時はここで何もしない（モーダルは既に開いている）。
  c.onclick=()=>{
    if(isLongPress){
      isLongPress=false;
      return;
    }
    window.open(item.url,'_blank');
  };

  return c;
}

function render(){
  const main=document.getElementById('main');
  main.innerHTML='';
  const list=items.filter(i=>i.platform===currentFolder)
                   .sort((a,b)=>(b.favorite-a.favorite)||(b.timestamp-a.timestamp));
  if(!list.length){
    main.innerHTML='<div class="empty"><div style="font-size:36px;margin-bottom:14px;">📭</div><p>動画がありません</p></div>';
    return;
  }
  const g=document.createElement('div');
  g.className='grid';
  list.forEach(i=>g.appendChild(renderCard(i)));
  main.appendChild(g);
}

function confirmDelete(){
  if(!selectedId)return;
  cleanupStaleDeletedEntries();
  const idx=items.findIndex(i=>i.id===selectedId);
  if(idx>-1){
    const backup=items[idx];
    const deletedId=selectedId;
    deletedStateMap[deletedId]={item:backup,index:idx,deletedAt:Date.now()};
    currentDeletedId=deletedId;
    items.splice(idx,1);
    db.save();
    render();
    ui.closeModal('deleteModal');
    ui.toast('削除しました',true);
  }
}

function doUndo(){
  const targetId=currentDeletedId;
  if(targetId&&deletedStateMap[targetId]){
    if(undoTimeoutId)clearTimeout(undoTimeoutId);
    items.splice(deletedStateMap[targetId].index,0,deletedStateMap[targetId].item);
    db.save();
    render();
    delete deletedStateMap[targetId];
    currentDeletedId=null;
    ui.toast('復元しました');
    undoTimeoutId=null;
  }
}

document.getElementById('addBtn').onclick=()=>{
  document.getElementById('urlInput').value='';
  document.getElementById('titleInput').value='';
  ui.showModal('addModal');
  document.getElementById('urlInput').focus();
};
document.getElementById('addClose').onclick=()=>ui.closeModal('addModal');
document.getElementById('addCancel').onclick=()=>ui.closeModal('addModal');
document.getElementById('addSave').onclick=saveVideo;

document.getElementById('deleteClose').onclick=()=>ui.closeModal('deleteModal');
document.getElementById('deleteCancel').onclick=()=>ui.closeModal('deleteModal');
document.getElementById('deleteConfirm').onclick=confirmDelete;

document.querySelectorAll('.folder-tab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.folder-tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    currentFolder=t.dataset.folder;
    render();
    document.getElementById('main').scrollTop=0;
  };
});

document.getElementById('settingsBtn').onclick=()=>ui.showModal('settingsOverlay');
document.getElementById('settingsClose').onclick=()=>ui.closeModal('settingsOverlay');
document.getElementById('darkThemeBtn').onclick=()=>applyTheme('dark');
document.getElementById('lightThemeBtn').onclick=()=>applyTheme('light');

document.getElementById('exportBtn').onclick=()=>{
  try{
    const data=JSON.stringify({version:'3.0',items},null,2),
          blob=new Blob([data],{type:'application/json'}),
          url=URL.createObjectURL(blob),
          a=document.createElement('a');
    a.href=url;
    a.download=`reel-mini-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    ui.toast('ダウンロード完了');
  }catch(e){ui.toast('エラー')}
};

function validateImportItem(item){
  if(!item||typeof item!=='object')return false;
  if(typeof item.id!=='string'||!item.id)return false;
  if(typeof item.url!=='string'||!item.url)return false;
  if(typeof item.title!=='string')return false;
  return ['youtube','tiktok','instagram','other'].includes(item.platform);
}

document.getElementById('importBtn').onclick=()=>document.getElementById('restoreFile').click();
document.getElementById('restoreFile').onchange=(e)=>{
  const f=e.target.files[0];
  if(!f)return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    try{
      const backup=JSON.parse(ev.target.result);
      if(!backup||!Array.isArray(backup.items))throw new Error('Invalid structure');
      // 修正2: 空配列は無条件で許可。中身がある場合のみバリデーションを必須とする
      if(backup.items.length>0){
        const allValid=backup.items.every(validateImportItem);
        if(!allValid)throw new Error('Invalid item structure');
      }
      items=backup.items.map(i=>({
        id:i.id,url:i.url,platform:i.platform,title:i.title,
        thumb:typeof i.thumb==='string'?i.thumb:null,
        favorite:typeof i.favorite==='boolean'?i.favorite:false,
        timestamp:typeof i.timestamp==='number'?i.timestamp:Date.now()
      }));
      db.save();
      render();
      ui.closeModal('settingsOverlay');
      ui.toast('インポート完了');
    }catch(err){
      console.error('Import error:',err);
      ui.toast('データ形式が不正です');
    }
  };
  reader.readAsText(f);
  e.target.value='';
};

document.getElementById('deleteAllBtn').onclick=()=>{
  if(confirm('削除しますか?')){
    items=[];
    db.save();
    render();
    ui.closeModal('settingsOverlay');
    ui.toast('削除完了');
  }
};

window.addEventListener('popstate',()=>{
  document.getElementById('addModal').classList.remove('show');
  document.getElementById('deleteModal').classList.remove('show');
  document.getElementById('settingsOverlay').classList.remove('show');
  selectedId=null;
});

if(history.length===1)window.history.pushState({page:'main'},null);
db.theme();
db.load();
render();
</script>
</body>
</html>
