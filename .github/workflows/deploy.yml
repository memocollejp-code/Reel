name: Auto Cache Invalidation

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'icon-*.png'

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update cache version in sw.js
        run: |
          TIMESTAMP=$(date +%s)
          sed -i "s/const CACHE_VERSION = .*/const CACHE_VERSION = '$TIMESTAMP';/" sw.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add sw.js
          git commit -m "chore: auto-update cache version [skip ci]" || echo "No changes to commit"
          git push

      - name: Trigger Pages deployment
        run: |
          echo "Cache invalidated. GitHub Pages will deploy the updated sw.js"
